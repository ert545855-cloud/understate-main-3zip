  <rect x="34" y="68" width="52" height="8" rx="2" fill="url(#pb-gold)" stroke="#8A661F" stroke-width="1.2"/>

  <circle cx="60" cy="30" r="3.2" fill="#F5EBD7" stroke="#8A661F" stroke-width="1"/>
  <circle cx="40" cy="38" r="2.4" fill="#F5EBD7" stroke="#8A661F" stroke-width="1"/>
  <circle cx="80" cy="38" r="2.4" fill="#F5EBD7" stroke="#8A661F" stroke-width="1"/>
  <circle cx="60" cy="58" r="3" fill="#B8423C" stroke="#8A661F" stroke-width="1"/>

  <!-- crescent + star flourish -->
  <path d="M60 84 a7 7 0 1 0 0.1 0" fill="none" stroke="#F5EBD7" stroke-width="1.6" stroke-dasharray="14 100" stroke-linecap="round" transform="rotate(20 60 84)"/>
  <path d="M66 84 l1.4 2.8 3.1 0.4 -2.3 2.1 0.6 3.1 -2.8-1.5 -2.8 1.5 0.6-3.1 -2.3-2.1 3.1-0.4z" fill="#F5EBD7" opacity="0.9" transform="translate(2 -6) scale(0.7)"/>

  <text x="60" y="102" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#C89B3C" letter-spacing="2">PADİŞAH</text>
