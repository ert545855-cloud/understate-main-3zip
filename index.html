  }
  .us-ripple-el {
    position: absolute;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.28);

    animation: us-ripple 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    z-index: 10;
  }
</style>

<script>
/* Global ripple — works on every button in the app */
(function() {
  function spawnRipple(btn, x, y) {
    if (btn.disabled) return;
    var r   = btn.getBoundingClientRect();
    var el  = document.createElement('span');
    el.className = 'us-ripple-el';
    el.style.left = (x - r.left) + 'px';
    el.style.top  = (y - r.top)  + 'px';
    /* make sure button clips the ripple */
    var cs = window.getComputedStyle(btn);
    if (cs.position === 'static')  btn.style.position = 'relative';
    if (cs.overflow !== 'hidden')  btn.style.overflow  = 'hidden';
    btn.appendChild(el);
    el.addEventListener('animationend', function() { el.remove(); }, { once: true });
  }
  document.addEventListener('mousedown', function(e) {
    var btn = e.target.closest('button');
    if (btn) spawnRipple(btn, e.clientX, e.clientY);
  }, { passive: true });
  document.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    var btn = e.target.closest('button');
    if (btn) spawnRipple(btn, t.clientX, t.clientY);
  }, { passive: true });
})();
</script>

<script>
// ── APK / Capacitor — Socket URL ayarı ────────────────────────────────────
// Capacitor'da window.location.origin "capacitor://localhost" döner, sunucuya ulaşamaz.
// AWS EB / deploy için PUBLIC_URL env var set edilmeli (sunucu /config.js ile inject eder).
(function() {
  var isCapacitor = (
    typeof window !== 'undefined' &&
    (window.location.protocol === 'capacitor:' ||
     window.location.protocol === 'ionic:' ||
     navigator.userAgent.indexOf('wv') !== -1 || // Android WebView
     (typeof Capacitor !== 'undefined'))
  );
  // Öncelik sırası:
  // 1. /config.js ile sunucudan gelen __BACKEND_URL__ (AWS EB PUBLIC_URL env var)
  // 2. Normal tarayıcıda mevcut origin
  // 3. Capacitor + __BACKEND_URL__ yoksa fallback (geliştirme için)
  var injected = (typeof window.__BACKEND_URL__ !== 'undefined' && window.__BACKEND_URL__)
    ? window.__BACKEND_URL__ : null;
  var backendUrl = injected || (isCapacitor ? '' : window.location.origin);
  if (!backendUrl && isCapacitor) {
    // Capacitor + PUBLIC_URL set edilmemişse uyarı ver
    console.warn('[Socket] UYARI: Capacitor modunda __BACKEND_URL__ tanımsız! PUBLIC_URL env var set edin.');
    backendUrl = window.location.origin;
  }
  window._SOCKET_URL = backendUrl;
  window.__ENV__ = window.__ENV__ || {};
  window.__ENV__.SOCKET_URL = backendUrl;
  window.__ENV__.API_BASE    = backendUrl;
  console.log('[Socket] URL ayarlandı:', backendUrl);
})();
</script>

function execCompiledCode(code) {
  try {

    var url  = URL.createObjectURL(blob);
    var s    = document.createElement('script');
    s.src    = url;
    s.onload  = function() { URL.revokeObjectURL(url); };
    s.onerror = function() { URL.revokeObjectURL(url); _showError('Kod yuklenemedi'); };
    document.body.appendChild(s);

}

  try {

function _babelOne(src) {
  if (!src || !window.Babel) return src || '';
  try {
    return Babel.transform(src, { presets: ['react'], sourceType: 'script' }).code;
  } catch(te) {
    console.warn('Babel derleme başarısız:', te.message);
    return src;
  }
}

function compileAndRun() {
  _advanceBar(75, 'Dosyalar yükleniyor...');
  var allFetches = SCREEN_FILES.map(function(f) {
    return fetch(f + '?v=' + V)
      .then(function(r) { return r.ok ? r.text() : ''; })
      .catch(function() { return ''; });
  });
  allFetches.push(
    fetch('src/app.js?v=' + V)
      .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.text();
      })
  );
  Promise.all(allFetches)
    .then(function(results) {
      _advanceBar(88, 'JSX derleniyor...');
      var compiledParts = results.map(function(src, i) {
        _advanceBar(88 + Math.floor(i / results.length * 8), 'Derleniyor ' + (i+1) + '/' + results.length + '...');
        return _babelOne(src);
      });
      var combined = compiledParts.join('\n');
      _advanceBar(98, 'Başlatılıyor...');
      execCompiledCode(combined);
    })
    .catch(function(err) { _showError('Yükleme hatası: ' + err.message); });
}

function boot() {

<!-- Socket.IO Oyun Köprüsü: Firebase yerine Socket.IO + Supabase REST -->
<script>
(function() {
  'use strict';

  var _socket = null;
  var _socketReady = false;
  var _pendingEmits = [];
  var _stateFlushTimer = null;
  var _rtFlushTimer = null;

  // Tüm realtime anahtarlar (sunucuya broadcast edilecek)
  var RT_KEYS = [
    'globalChat','cityChats','parliamentMsgs','supportMsgs','liveNews','announcements','activityFeed','klanChat',
    'users','economy','stockMarket','parties','gangs','holdings',
    'laws','lawProposals','cabinet','ohal','elections','electionState',
    'taxSystem','coupSystem','cityMap','gameEvents','prisonList',
    'auctionItems','courtCases','realEstate','alliances','referendums',
    'marketDemand','commodities','energyMarket','marketCrisis','cityStats','cityWelfare',
    'inventory','cityOwnership','combatLog','electionResults','factionWars'
  ];

  function emit(event, data) {
    if (_socket && _socketReady) {
      _socket.emit(event, data);
    } else {
      _pendingEmits.push({ event, data });
    }
  }

  function flushPending() {
    var q = _pendingEmits.splice(0);
    q.forEach(function(p) { _socket.emit(p.event, p.data); });
  }

  // Sunucudan gelen state güncellemesini React'e yansıt
  function applyStateUpdate(key, value) {
    try {
      var incoming = JSON.stringify(value);
      if (localStorage.getItem('rep_' + key) === incoming) return;
      localStorage.setItem('rep_' + key, incoming);
      window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: key, value: value } }));
    } catch(e) {}
  }

  // Sunucudan ilk state yükle
  function loadInitialStateFromServer() {
    var base = window._SOCKET_URL || '';

    fetch(base+'/api/game/state')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        Object.entries(data).forEach(function(entry) {
          applyStateUpdate(entry[0], entry[1]);
        });
        console.log('[Socket Bridge] Sunucu state yüklendi ✓ —', Object.keys(data).length, 'anahtar');
      })
      .catch(function(e) { console.warn('[Socket Bridge] State yüklenemedi:', e.message); });

    // Partileri yükle
    fetch(base+'/api/game/parties')
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        var parties = resp.data || resp;
        if (!parties || !parties.length) return;
        var map = {};
        parties.forEach(function(p) { map[p.id] = p; });
        applyStateUpdate('parties', map);
      }).catch(function(){});

    // Çeteleri yükle
    fetch(base+'/api/game/gangs')
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        var gangs = resp.data || resp;
        if (!gangs || !gangs.length) return;
        var map = {};
        gangs.forEach(function(g) { map[g.id] = g; });
        applyStateUpdate('gangs', map);
      }).catch(function(){});

    // Market listeleri
    fetch(base+'/api/marketplace')
      .then(function(r) { return r.json(); })
      .then(function(resp) {
        var market = resp.listings || resp.data || resp;
        if (!market || !market.length) return;
        var map = {};
        market.forEach(function(c) { map[c.id||c.company_id] = c; });
        applyStateUpdate('stockMarket', map);
      }).catch(function(){});

    // Şehir sahipliği (game state'ten)
    fetch(base+'/api/game/state')
      .then(function(r) { return r.json(); })
      .then(function(data) { if (data && data.cityOwnership) applyStateUpdate('cityOwnership', data.cityOwnership); })
      .catch(function(){});
  }

  function initSocketBridge() {
    if (typeof io === 'undefined') {
      console.warn('[Socket Bridge] socket.io henüz yüklenmedi, 500ms bekleniyor...');
      setTimeout(initSocketBridge, 500);
      return;
    }

    var socketUrl = window._SOCKET_URL || (window.__ENV__ && window.__ENV__.SOCKET_URL) || window.location.origin;
    // Mixed Content önlemi: sayfa HTTPS ise socket URL de HTTPS/WSS olmalı
    if (window.location.protocol === 'https:' && socketUrl.startsWith('http://')) {
      socketUrl = socketUrl.replace('http://', 'https://');
    }
    var _jwtToken = localStorage.getItem('authToken') || localStorage.getItem('us_jwt') || '';

    _socket = io(socketUrl, {
      auth: { token: _jwtToken },
      reconnection: true,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      reconnectionAttempts: Infinity,
      transports: ['websocket', 'polling']
    });

    window._gameSocket = _socket;
    window._socket = _socket; // app.js ile uyumluluk

    _socket.on('connect', function() {
      _socketReady = true;
      localStorage.setItem('us_lastSocketId', _socket.id);
      console.log('[Socket Bridge] Bağlantı kuruldu ✓', _socket.id);
      flushPending();
      loadInitialStateFromServer();

      // Presence kaydı
      var userId = localStorage.getItem('rep_userId') || localStorage.getItem('userId');
      var prof = {};
      try { prof = JSON.parse(localStorage.getItem('rep_userProfile') || '{}'); } catch(e) {}
      if (userId) {
        _socket.emit('playerJoin', {
          userId: userId,
          username: prof.username || 'Oyuncu',
          level: prof.level || 1,
          city: prof.city || '',
          gender: prof.gender || 'erkek',
          money: prof.money || 0,
          party: prof.party || null,
          gang: prof.gang || null,
          avatar: prof.avatar || null
        });
      }
      window.dispatchEvent(new CustomEvent('socket-connected', { detail: { socketId: _socket.id } }));
    });

    _socket.on('disconnect', function() {
      _socketReady = false;
      window.dispatchEvent(new CustomEvent('socket-disconnected'));
    });

    // Sunucu oyuncuyu odaya atadığında roomId'yi sakla
    _socket.on('roomAssigned', function(data) {
      if (data && data.roomId) {
        localStorage.setItem('us_roomId', data.roomId);
        console.log('[Socket Bridge] Odaya atandı:', data.roomId, data.roomName);
        window.dispatchEvent(new CustomEvent('room-assigned', { detail: data }));
      }
    });

    _socket.on('reconnect', function() {
      _socketReady = true;
      window.dispatchEvent(new CustomEvent('socket-reconnected'));
      // Yeni JWT ile auth güncelle
      var newJwt = localStorage.getItem('authToken') || localStorage.getItem('us_jwt') || '';
      if (newJwt) {
        _socket.emit('tokenRefreshed', {
          userId: localStorage.getItem('rep_userId'),
          username: localStorage.getItem('rep_username')
        });
      }
      // Eski socket ID ile odaya geri dön
      var oldSocketId = localStorage.getItem('us_lastSocketId');
      if (oldSocketId) {
        _socket.emit('reconnectToRoom', { oldSocketId: oldSocketId });
      }
      // playerJoin yeniden gönder
      var userId = localStorage.getItem('rep_userId');
      if (userId) {
        var prof = {};
        try { prof = JSON.parse(localStorage.getItem('rep_userProfile') || '{}'); } catch(e) {}
        _socket.emit('playerJoin', {
          userId: userId,
          username: prof.username || localStorage.getItem('rep_username') || 'Oyuncu',
          level: prof.level || 1,
          city: prof.city || '',
          gender: prof.gender || 'erkek',
          party: prof.party || null,
          gang: prof.gang || null,
          avatar: prof.avatar || null
        });
      }
    });

    // (us_lastSocketId artık yukarıdaki tek 'connect' handler'ında kaydediliyor)

    // ── Sunucudan gelen eventler ─────────────────────────────────────
    _socket.on('stateUpdate', function(data) {
      if (data.key && data.value !== undefined) {
        applyStateUpdate(data.key, data.value);
      }
    });

    _socket.on('chat', function(data) {
      try {
        var rawChannel = data.channel || 'globalChat';
        // Normalize mesaj formatı (app.js {text,username,ts} bekliyor)
        var newMsg = {
          id: data.id || Math.random().toString(36).slice(2),
          userId: data.userId || null,
          username: data.sender || data.username || 'Oyuncu',
          text: data.message || data.text || '',
          ts: data.timestamp || data.ts || Date.now(),
          level: data.level || 1,
          gender: data.gender || null,
          premium: data.premium || false,
          photoUrl: data.photoUrl || null,
          channel: rawChannel,
        };

        if (rawChannel.startsWith('city_')) {
          var cityKey = rawChannel.replace('city_', '');
          var cityChats = {};
          try { cityChats = JSON.parse(localStorage.getItem('rep_cityChats') || '{}'); } catch(e) {}
          if (typeof cityChats !== 'object' || Array.isArray(cityChats)) cityChats = {};
          var cityArr = Array.isArray(cityChats[cityKey]) ? cityChats[cityKey] : [];
          if (!cityArr.find(function(m) { return m.id === newMsg.id; })) {
            cityChats[cityKey] = cityArr.concat([newMsg]).slice(-100);
            localStorage.setItem('rep_cityChats', JSON.stringify(cityChats));
            window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'cityChats', value: cityChats } }));
          }
        } else if (rawChannel.startsWith('klan_')) {
          var klanChat = [];
          try { klanChat = JSON.parse(localStorage.getItem('rep_klanChat') || '[]'); } catch(e) {}
          if (!Array.isArray(klanChat)) klanChat = [];
          if (!klanChat.find(function(m) { return m.id === newMsg.id; })) {
            klanChat = klanChat.concat([newMsg]).slice(-200);
            localStorage.setItem('rep_klanChat', JSON.stringify(klanChat));
            window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'klanChat', value: klanChat } }));
          }
        } else {
          // globalChat ve diğerleri
          var lsKey = rawChannel; // 'globalChat' → rep_globalChat
          var current = [];
          try { current = JSON.parse(localStorage.getItem('rep_' + lsKey) || '[]'); } catch(e) {}
          if (!Array.isArray(current)) current = [];
          if (!current.find(function(m) { return m.id === newMsg.id; })) {
            current = current.concat([newMsg]).slice(-200);
            localStorage.setItem('rep_' + lsKey, JSON.stringify(current));
            window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: lsKey, value: current } }));
          }
        }
      } catch(e) { console.warn('[Socket Bridge] Chat işleme hatası:', e); }
    });

    _socket.on('chatHistory', function(history) {
      try {
        if (!Array.isArray(history) || !history.length) return;
        var channel = history[0].channel || 'global';
        var lsKey = channel === 'global' ? 'globalChat' : ('cityChat_' + channel);
        localStorage.setItem('rep_' + lsKey, JSON.stringify(history));
        window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: lsKey, value: history } }));
        console.log('[Socket Bridge] Chat geçmişi yüklendi ✓', history.length, 'mesaj');
      } catch(e) {}
    });

    _socket.on('onlineCount', function(count) {
      localStorage.setItem('rep_onlineCount', JSON.stringify(count));
      window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'onlineCount', value: count } }));
    });

    _socket.on('onlinePlayers', function(players) {
      localStorage.setItem('rep_onlinePlayers', JSON.stringify(players));
      window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'onlinePlayers', value: players } }));
      window.dispatchEvent(new CustomEvent('presence-updated', { detail: { count: players.length, players: players } }));
    });

    _socket.on('marketUpdate', function(data) {
      try {
        var market = {};
        try { market = JSON.parse(localStorage.getItem('rep_stockMarket') || '{}'); } catch(e) {}
        if (data.companyId) {
          market[data.companyId] = typeof data.price !== 'undefined' ? Number(data.price) : market[data.companyId];
        }
        localStorage.setItem('rep_stockMarket', JSON.stringify(market));
        window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'stockMarket', value: market } }));
      } catch(e) {}
    });

    _socket.on('marketSnapshot', function(companies) {
      try {
        if (!Array.isArray(companies)) return;
        var map = {};
        companies.forEach(function(c) {
          if (c.companyId) map[c.companyId] = typeof c.price !== 'undefined' ? Number(c.price) : 0;
        });
        if (Object.keys(map).length) {
          localStorage.setItem('rep_stockMarket', JSON.stringify(map));
          window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'stockMarket', value: map } }));
        }
      } catch(e) {}
    });

    _socket.on('partyUpdate', function(data) {
      try {
        if (Array.isArray(data.parties)) {
          localStorage.setItem('rep_parties', JSON.stringify(data.parties));
          window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'parties', value: data.parties } }));
        }
      } catch(e) {}
    });

    _socket.on('gangUpdate', function(data) {
      try {
        var gangs = [];
        try {
          var raw = JSON.parse(localStorage.getItem('rep_gangs') || '[]');
          gangs = Array.isArray(raw) ? raw : Object.values(raw);
        } catch(e) {}
        if (Array.isArray(data.gangs)) {
          gangs = data.gangs;
        } else if (data.gang && data.gang.id) {
          var gi = gangs.findIndex(function(g) { return g.id === data.gang.id; });
          if (gi >= 0) { gangs[gi] = data.gang; } else { gangs.push(data.gang); }
        } else if (data.id) {
          var idx = gangs.findIndex(function(g) { return g.id === data.id; });
          if (idx >= 0) { gangs[idx] = data; } else { gangs.push(data); }
        }
        localStorage.setItem('rep_gangs', JSON.stringify(gangs));
        window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'gangs', value: gangs } }));
      } catch(e) {}
    });

    _socket.on('electionUpdate', function(data) {
      try {
        if (data.elections !== undefined) {
          localStorage.setItem('rep_elections', JSON.stringify(data.elections));
          window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'elections', value: data.elections } }));
        }
        if (data.elections_multi !== undefined) {
          localStorage.setItem('rep_elections_multi', JSON.stringify(data.elections_multi));
          window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'elections_multi', value: data.elections_multi } }));
        }
      } catch(e) {}
    });

    // ── Meclis decision banner ─────────────────────────────────────────────
    function showMeclisBanner(payload) {
      var b = document.getElementById('mec-banner');
      if (!b) return;
      document.getElementById('mec-banner-icon').textContent = payload.icon || '🏛️';
      document.getElementById('mec-banner-text').textContent = payload.title || 'Meclis Kararı';
      document.getElementById('mec-banner-sub').textContent  = '⚑ ' + (payload.party || 'Meclis') + ' — ' + (payload.by || '');
      // If military banner visible, push meclis banner down
      var milB = document.getElementById('mil-banner');
      var offset = (milB && milB.style.display !== 'none') ? (milB.offsetHeight || 64) : 0;
      b.style.top = offset + 'px';
      // Reset and show
      b.style.display = 'none';
      void b.offsetWidth;
      b.style.animation = 'mecBannerSlide 0.4s cubic-bezier(0.25,0.46,0.45,0.94) forwards, mecBannerPulse 1.5s ease-in-out 0.4s infinite';
      var bar = document.getElementById('mec-banner-bar');
      bar.style.animation = 'none';
      void bar.offsetWidth;
      bar.style.animation = 'mecBannerTimer 5s linear forwards';
      b.style.display = 'flex';
      b.style.flexDirection = 'column';
      clearTimeout(window._mecBannerTimer);
      window._mecBannerTimer = setTimeout(function() {
        b.style.display = 'none';
      }, 5000);
    }

    // ── Military order banner ──────────────────────────────────────────────
    function showMilitaryBanner(order, chief) {
      var b = document.getElementById('mil-banner');
      if (!b) return;
      document.getElementById('mil-banner-icon').textContent  = order.icon || '🪖';
      document.getElementById('mil-banner-text').textContent  = order.label || 'Askeri Emir';
      document.getElementById('mil-banner-sub').textContent   = '🪖 Genelkurmay Başkanı ' + (chief || '?') + ' tarafından verildi';
      // Reset animation
      b.style.display = 'none';
      void b.offsetWidth;
      var bar = document.getElementById('mil-banner-bar');
      bar.style.animation = 'none';
      void bar.offsetWidth;
      bar.style.animation = 'milBannerTimer 6s linear forwards';
      b.style.display = 'flex';
      b.style.flexDirection = 'column';
      // Auto-dismiss after 6s
      clearTimeout(window._milBannerTimer);
      window._milBannerTimer = setTimeout(function() {
        b.style.display = 'none';
      }, 6000);
    }

    _socket.on('gameEvent', function(data) {
      try {
        var events = [];
        try { events = JSON.parse(localStorage.getItem('rep_gameEvents') || '[]'); } catch(e) {}
        events.unshift(data);
        if (events.length > 50) events = events.slice(0, 50);
        localStorage.setItem('rep_gameEvents', JSON.stringify(events));
        window.dispatchEvent(new CustomEvent('fb-sync', { detail: { key: 'gameEvents', value: events } }));
        window.dispatchEvent(new CustomEvent('new-game-event', { detail: data }));
        // Show banner for military orders
        if (data && data.type === 'militaryOrder' && data.payload) {
          showMilitaryBanner(data.payload.order || {}, data.payload.chief || '');
        }
        // Show banner for Meclis decisions
        if (data && data.type === 'meclisBanner' && data.payload) {
          showMeclisBanner(data.payload);
        }
      } catch(e) {}
    });

    _socket.on('economyUpdate', function(data) {
      applyStateUpdate('economy', data);
    });

    // Yeni sistemler
    _socket.on('combatResult', function(data) {
      window.dispatchEvent(new CustomEvent('combat-result', { detail: data }));
      applyStateUpdate('lastCombat', data);
    });

    _socket.on('cityOwnershipUpdate', function(data) {
      applyStateUpdate('cityOwnership', data);
      window.dispatchEvent(new CustomEvent('city-ownership-updated', { detail: data }));
    });

    _socket.on('inventoryUpdate', function(data) {
      if (data.userId) applyStateUpdate('inventory_' + data.userId, data.inventory);
      window.dispatchEvent(new CustomEvent('inventory-updated', { detail: data }));
    });

    _socket.on('electionResult', function(data) {
      applyStateUpdate('electionResults', data);
      window.dispatchEvent(new CustomEvent('election-result', { detail: data }));
    });

    _socket.on('mafiaWarUpdate', function(data) {
      applyStateUpdate('factionWars', data);
      window.dispatchEvent(new CustomEvent('mafia-war-updated', { detail: data }));
    });

    _socket.on('antiCheatAlert', function(data) {
      console.warn('[Anti-Cheat] Uyarı:', data.reason);
      window.dispatchEvent(new CustomEvent('anti-cheat-alert', { detail: data }));
    });

    _socket.on('serverAction', function(data) {
      if (data.key && data.value !== undefined) applyStateUpdate(data.key, data.value);
      window.dispatchEvent(new CustomEvent('server-action', { detail: data }));
    });

    _socket.on('tradeOffer', function(data) {
      window.dispatchEvent(new CustomEvent('trade-offer', { detail: data }));
    });

    _socket.on('tradeResponse', function(data) {
      window.dispatchEvent(new CustomEvent('trade-response', { detail: data }));
    });

    _socket.on('dm', function(data) {
      window.dispatchEvent(new CustomEvent('dm-received', { detail: data }));
    });

    _socket.on('playerUpdate', function(data) {
      window.dispatchEvent(new CustomEvent('player-updated', { detail: { data: data } }));
    });

    console.log('[Socket Bridge] Başlatıldı ✓');
  }

  // ── Firebase flush'u Socket.IO'ya yönlendir ───────────────────────
  // (Supabase bridge zaten game_state'e yazıyor, burası socket broadcast ekler)
  function hookSocketIntoFlush() {
    var _origSchedule = window._fbScheduleFlush;
    window._fbScheduleFlush = function(key) {
      // Orijinal (Supabase) flush devam etsin
      if (_origSchedule) _origSchedule(key);

      // Aynı zamanda socket üzerinden sunucuya broadcast et
      var isRT = key && RT_KEYS.includes(key);
      if (isRT) {
        if (_rtFlushTimer) clearTimeout(_rtFlushTimer);
        _rtFlushTimer = setTimeout(function() {
          var value = window._fbPendingWrites && window._fbPendingWrites[key];
          if (value !== undefined) {
            emit('saveState', { key: key, value: value });
          }
        }, 200);
      } else {
        if (_stateFlushTimer) clearTimeout(_stateFlushTimer);
        _stateFlushTimer = setTimeout(function() {
          var pending = window._fbPendingWrites || {};
          Object.entries(pending).forEach(function(entry) {
            emit('saveState', { key: entry[0], value: entry[1] });
          });
        }, 3000);
      }
    };

    // Presence heartbeat socket üzerinden
    var _origHeartbeat = window._startPresenceHeartbeat;
    window._startPresenceHeartbeat = function(userId, username) {
      // Eski Firebase heartbeat (varsa)
      if (_origHeartbeat) _origHeartbeat(userId, username);

      // Socket heartbeat
      if (!userId || window._socketHeartbeatTimer) return;
      var update = function() {
        var hbProf = {};
        try { hbProf = JSON.parse(localStorage.getItem('rep_userProfile') || '{}'); } catch(e) {}
        emit('heartbeat', {
          userId:   userId,
          username: username,
          at:       Date.now(),
          level:    hbProf.level || 1,
          city:     hbProf.city  || '',
          party:    hbProf.party || null,
          gang:     hbProf.gang  || null,
        });
      };
      update();
      window._socketHeartbeatTimer = setInterval(update, 15000);
      window.addEventListener('beforeunload', function() {
        clearInterval(window._socketHeartbeatTimer);
        if (_socket) _socket.emit('playerLeave', { userId: userId });
      }, { once: true });
    };

    // Kullanıcı giriş olayı → socket'e bağla
    window.addEventListener('user-logged-in', function(e) {
      var data = e.detail || {};
      if (!data.userId) return;
      var prof = {};
      try { prof = JSON.parse(localStorage.getItem('rep_userProfile') || '{}'); } catch(x) {}
      emit('playerJoin', {
        userId: data.userId,
        username: data.username || prof.username || 'Oyuncu',
        level: prof.level || 1,
        city: prof.city || '',
        gender: prof.gender || 'erkek',
        money: prof.money || 0,
        party: prof.party || null,
        gang: prof.gang || null,
        avatar: prof.avatar || null
      });
      // Kullanıcıya özgü inventory yükle
      fetch((window._SOCKET_URL||'')+'/api/inventory/' + data.userId)
        .then(function(r) { return r.json(); })
        .then(function(inv) { if (inv) applyStateUpdate('inventory_' + data.userId, inv); })
        .catch(function(){});
    });

    // Profil güncellemelerini sunucuya ilet
    window.addEventListener('fb-sync', function(e) {
      var key = e.detail && e.detail.key;
      var value = e.detail && e.detail.value;
      if (key === 'userProfile' && value && value.userId) {
        emit('playerUpdate', {
          userId: value.userId,
          username: value.username,
          level: value.level,
          money: value.money,
          city: value.city,
          party: value.party,
          gang: value.gang
        });
      }
    });

    console.log('[Socket Bridge] Flush hook aktif ✓');
  }

  // Sayfa hazır olunca başlat
  // Socket.IO scripti body'de yükleniyor, DOMContentLoaded'da hazır olmayabilir
  function startBridge() {
    hookSocketIntoFlush();
    initSocketBridge();
  }

  if (document.readyState === 'complete') {
    startBridge();
  } else {
    window.addEventListener('load', startBridge);
  }
})();
</script>

<!-- ═══════════════════════════════════════════════════════════════
     SERVICE WORKER + JWT AUTO-REFRESH + ERROR BOUNDARY + ADMOB
     ════════════════════════════════════════════════════════════════ -->
<script>
(function() {
  'use strict';

  // ── Service Worker registration ─────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
        .then(function(reg) {
          console.log('[SW] Registered ✓ scope:', reg.scope);
          reg.addEventListener('updatefound', function() {
            var newSW = reg.installing;
            newSW.addEventListener('statechange', function() {
              if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                console.log('[SW] Update available');
                newSW.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        })
        .catch(function(err) { console.warn('[SW] Registration failed:', err); });

      // Handle SW messages (e.g. background sync)
      navigator.serviceWorker.addEventListener('message', function(evt) {
        if (evt.data && evt.data.type === 'SYNC_REQUESTED') {
          if (window._mongoSave) window._mongoSave();
        }
      });
    });
  }

  // ── Push Bildirim Sistemi ────────────────────────────────────────────────
  window._pushManager = (function() {
    var _reg = null;

    // Push desteği var mı?
    function isSupported() {
      return 'serviceWorker' in navigator && 'PushManager' in window && 'Notification' in window;
    }

    // Bildirim izni iste
    async function requestPermission() {
      if (!isSupported()) return 'unsupported';
      var result = await Notification.requestPermission();
      console.log('[Push] İzin:', result);
      return result; // 'granted' | 'denied' | 'default'
    }

    // VAPID public key al ve abone ol
    async function subscribe() {
      if (!isSupported()) return null;
      try {
        _reg = await navigator.serviceWorker.ready;
        var vapidKey = await fetch((window._SOCKET_URL||'')+'/api/push/vapid-key').then(r => r.json()).then(d => d.publicKey || '');
        var sub = await _reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: vapidKey
        });
        console.log('[Push] Abone olundu ✓');
        return sub;
      } catch(e) {
        console.warn('[Push] Abonelik hatası:', e.message);
        return null;
      }
    }

    // Sunucuya subscription gönder
    async function sendSubscriptionToServer(sub) {
      if (!sub) return;
      try {
        var token = localStorage.getItem('us_jwt') || '';
        await fetch((window._SOCKET_URL||'')+'/api/push/subscribe', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
          },
          body: JSON.stringify({ subscription: sub })
        });
        console.log('[Push] Sunucuya kaydedildi ✓');
      } catch(e) {
        console.warn('[Push] Sunucu kaydı hatası:', e.message);
      }
    }

    return { isSupported, requestPermission, subscribe, sendSubscriptionToServer };
  })();

  // ── URL Param Handler (emailVerified + resetToken) ──────────────────────────
  (function() {
    try {
      var params = new URLSearchParams(window.location.search);
      if (params.get('emailVerified') === '1') {
        window._emailVerifiedFlag = true;
        try {
          var p = JSON.parse(localStorage.getItem('rep_userProfile') || 'null');
          if (p) { p.emailVerified = true; localStorage.setItem('rep_userProfile', JSON.stringify(p)); }
        } catch(e) {}
        history.replaceState(null, '', window.location.pathname);
      }
      var rt = params.get('resetToken'), ruid = params.get('userId');
      if (rt && ruid) {
        window._resetTokenData = { token: rt, userId: ruid };
        history.replaceState(null, '', window.location.pathname);
      }
    } catch(e) {}
  })();

  // ── Notification Click Handler ─────────────────────────────────────
  window.addEventListener('notificationclick', function(evt) {
    evt.notification.close();
    if (evt.action === 'open') {
      var url = evt.notification.data?.url || '/';
      evt.waitUntil(clients.matchAll({ type: 'window' }).then(function(clientList) {
        for (var i = 0; i < clientList.length; i++) {
          if (clientList[i].url === url && 'focus' in clientList[i]) {
            return clientList[i].focus();
          }
        }
        if (clients.openWindow) return clients.openWindow(url);
      }));
    }
  });

  // ── JWT Auto-Refresh ────────────────────────────────────────────────────
  window._jwtRefresh = (function() {
    var _refreshTimer = null;

    function scheduleRefresh() {
      var token = localStorage.getItem('authToken');
      if (!token) return;
      try {
        var parts = token.split('.');
        if (parts.length !== 3) return;
        var payload = JSON.parse(atob(parts[1]));
        var exp = payload.exp * 1000;
        var now = Date.now();
        var timeUntilExp = exp - now;
        var refreshAt = timeUntilExp - 60000; // 1 dakika öncesinde refresh et

        if (refreshAt > 0) {
          if (_refreshTimer) clearTimeout(_refreshTimer);
          _refreshTimer = setTimeout(refresh, refreshAt);
          console.log('[JWT] Refresh zamanlandı ✓ (', Math.round(refreshAt / 1000), 's)');
        }
      } catch(e) {
        console.warn('[JWT] Token parse hatası:', e.message);
      }
    }

    function refresh() {
      fetch((window._SOCKET_URL||'')+'/api/refresh-token', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.token) {
            localStorage.setItem('authToken', data.token);
            console.log('[JWT] Yenilendi ✓');
            scheduleRefresh(); // Yeni zamanla
          }
        })
        .catch(function(e) { console.warn('[JWT] Yenileme hatası:', e.message); });
    }

    return { scheduleRefresh, refresh };
  })();

  // Sayfa yüklenince JWT refresh'i başlat
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', window._jwtRefresh.scheduleRefresh);
  } else {
    window._jwtRefresh.scheduleRefresh();
  }

  // ── Genel Error Boundary (Network hatalarını yakala) ────────────────────
  window.addEventListener('error', function(evt) {
    console.error('[Error] Yakalanamayan hata:', evt.error?.message);
    // Optiyonel: Hata sunucuya gönder
    if (navigator.sendBeacon) {
      navigator.sendBeacon('/api/error-log', JSON.stringify({
        message: evt.error?.message,
        stack: evt.error?.stack,
        url: window.location.href,
        timestamp: new Date().toISOString()
      }));
    }
  });

  window.addEventListener('unhandledrejection', function(evt) {
    console.error('[Promise Rejection]', evt.reason);
    // Optiyonel: Reject'i sunucuya gönder
    if (navigator.sendBeacon) {
      navigator.sendBeacon('/api/error-log', JSON.stringify({
        message: 'Unhandled Promise Rejection: ' + evt.reason,
        url: window.location.href,
        timestamp: new Date().toISOString()
      }));
    }
  });

})();
</script>
